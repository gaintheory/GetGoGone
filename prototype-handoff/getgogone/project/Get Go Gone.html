<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Get.Go.Gone. — Marketing Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="screens/creative-preview.jsx"></script>
<script type="text/babel" src="screens/creative-templates.jsx"></script>
<script type="text/babel" src="screens/creative-canvas.jsx"></script>
<script type="text/babel" src="screens/creative-left.jsx"></script>
<script type="text/babel" src="screens/creative-right.jsx"></script>
<script type="text/babel" src="screens/creative-builder.jsx"></script>
<script type="text/babel" src="screens/dashboard.jsx"></script>
<script type="text/babel" src="screens/inventory.jsx"></script>
<script type="text/babel" src="screens/vehicle-detail.jsx"></script>
<script type="text/babel" src="screens/campaign-builder.jsx"></script>
<script type="text/babel" src="screens/creatives.jsx"></script>
<script type="text/babel" src="screens/templates.jsx"></script>
<script type="text/babel" src="screens/leads.jsx"></script>
<script type="text/babel" src="screens/test-drive.jsx"></script>
<script type="text/babel" src="screens/marketing.jsx"></script>
<script type="text/babel" src="screens/reports.jsx"></script>
<script type="text/babel" src="screens/settings.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

<script type="text/babel">
  // Wait for all babel scripts to be ready, then mount
  function tryMount() {
    if (window.App && window.Dashboard && window.Inventory && window.VehicleDetail
      && window.CampaignBuilder && window.CreativePreview && window.Creatives
      && window.Templates && window.Leads && window.TestDrive && window.Reports && window.Settings
      && window.CreativeBuilder && window.CBCanvas && window.CBLeftSidebar && window.CBRightSidebar
      && window.CreativeBuilderData
      && window.Marketing
      && window.Icon && window.GGG && window.UI) {
      ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
    } else {
      setTimeout(tryMount, 30);
    }
  }
  tryMount();
</script>
</body>
</html>
